<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <p>Get real-time weather information</p>
        </header>

        <div class="search-section">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Enter city name..." 
                class="search-input"
            >
            <button id="searchBtn" class="search-btn">Search</button>
        </div>

        <div id="loadingSpinner" class="spinner hidden"></div>

        <div id="errorMessage" class="error-message hidden"></div>

        <div id="weatherContainer" class="weather-container hidden">
            <div class="weather-card main-card">
                <div class="location">
                    <h2 id="cityName"></h2>
                    <p id="date"></p>
                </div>
                
                <div class="current-weather">
                    <div class="temperature">
                        <span id="temp" class="temp-value"></span>
                        <span class="temp-unit">°C</span>
                    </div>
                    <div class="weather-description">
                        <p id="description"></p>
                        <p id="feelsLike"></p>
                    </div>
                </div>

                <div class="weather-details">
                    <div class="detail-item">
                        <span class="detail-label">💧 Humidity</span>
                        <span id="humidity" class="detail-value"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">💨 Wind Speed</span>
                        <span id="windSpeed" class="detail-value"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">🌡️ Pressure</span>
                        <span id="pressure" class="detail-value"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">👁️ Visibility</span>
                        <span id="visibility" class="detail-value"></span>
                    </div>
                </div>
            </div>

            <div class="forecast-section">
                <h3>7-Day Forecast</h3>
                <div id="forecastContainer" class="forecast-container"></div>
            </div>
        </div>

        <footer>
            <p>Weather data provided by Open-Meteo API</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
