<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <link rel="stylesheet" href="todo-style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 My To-Do List</h1>
            <p>Stay organized and productive</p>
        </header>

        <div class="input-section">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="Add a new task..." 
                class="todo-input"
            >
            <button id="addBtn" class="add-btn">Add Task</button>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <div class="stats-section">
            <div class="stat">
                <span class="stat-label">Total Tasks:</span>
                <span id="totalTasks" class="stat-value">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Completed:</span>
                <span id="completedTasks" class="stat-value">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Pending:</span>
                <span id="pendingTasks" class="stat-value">0</span>
            </div>
        </div>

        <div id="todoList" class="todo-list"></div>

        <div id="emptyState" class="empty-state">
            <p>✨ No tasks yet. Add one to get started!</p>
        </div>

        <div class="action-section">
            <button id="clearCompleted" class="clear-btn">Clear Completed</button>
            <button id="clearAll" class="clear-btn danger">Clear All</button>
        </div>

        <footer>
            <p>All your tasks are saved locally in your browser</p>
        </footer>
    </div>

    <script src="todo-script.js"></script>
</body>
</html>
